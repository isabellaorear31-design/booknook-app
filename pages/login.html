<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNook | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="login-page">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card shadow-lg p-4 border-0">
            <div class="card-body text-center">
                <h1 class="text-pink mb-2">💖</h1>
                <h2 class="text-pink mb-4">Welcome to BookNook</h2>
                <p class="text-muted small mb-4">Please log in to browse the collection</p>
                
                <form id="login-form">
                    <div class="mb-3">
                        <input type="text" id="username" class="form-control rounded-pill px-4" placeholder="Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control rounded-pill px-4" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 shadow-sm">Enter Library</button>
                </form>
                
                <div class="mt-4">
                    <a href="../index.html" class="text-pink text-decoration-none small">← Back to home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (pass.length > 0) {
                console.log("Success: User '" + user + "' logged in at " + new Date().toLocaleTimeString());
                
               
                sessionStorage.setItem("activeUser", user);
                
          
                alert("Welcome back, " + user + "!");
                window.location.href = "../index.html"; 
            } else {
                console.error("Login Failure: Password field was empty.");
            }
        };
    </script>
</body>
</html>
