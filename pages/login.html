<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNook | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head> 
<body class="login-page">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card shadow-lg p-5 border-0">
            <h1 class="text-pink text-center">💖 BookNook</h1>
            <p class="text-center text-muted">Please log in to browse the collection.</p>
            <form id="login-form">
                <input type="text" id="username" class="form-control rounded-pill mb-3" placeholder="Username" required>
                <input type="password" id="password" class="form-control rounded-pill mb-3" placeholder="Password" required>
                <button type="submit" class="btn btn-danger w-100 rounded-pill">Enter Library</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
           const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        
        if (pass.length > 0) {
            console.log("Login Success: User '" + user + "' authenticated at " + new Date().toLocaleTimeString());
            
            sessionStorage.setItem("activeUser", user);
            window.location.href = "../index.html"; 
        } else {
         
            console.error("Login Failure: Attempt made with empty password field.");
        }
    };
    </script>
</body>
</html>
