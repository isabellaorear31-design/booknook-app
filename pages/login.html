<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNook | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="login-page">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card shadow-lg p-4 border-0">
            <div class="card-body text-center">
                <h1 class="mb-2">🌸</h1>
                <h2 class="text-pink mb-4">BookNook Login</h2>
                <form id="login-form">
                    <input type="text" id="username" class="form-control rounded-pill mb-3 px-4" placeholder="Username" required>
                    <input type="password" id="password" class="form-control rounded-pill mb-3 px-4" placeholder="Password" required>
                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2">Unlock Library</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            sessionStorage.setItem("activeUser", user); // Save login state
            console.log("Login Success: " + user); // Rubric Requirement 4C
            window.location.href = "../index.html"; 
        };
    </script>
</body>
</html>
