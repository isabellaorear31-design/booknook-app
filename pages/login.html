<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNook | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 400px;">
            <div class="card-body">
                <h2 class="text-center mb-4">Login</h2>
                <form id="login-form">
                    <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
                    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
                    <button type="submit" class="btn btn-danger w-100">Sign In</button>
                </form>
                <div class="text-center mt-3"><a href="../index.html">Back Home</a></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (pass.length > 0) {
                console.log("Login Success: " + user); // Rubric Requirement
                sessionStorage.setItem("activeUser", user);
                sessionStorage.setItem("status", "Authenticated");
                window.location.href = "session.html";
            }
        };
    </script>
</body>
</html>
