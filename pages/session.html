<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNook | Reading List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="p-5 bg-light">
    <div class="container bg-white shadow p-5 rounded-4 mx-auto" style="max-width: 600px;">
        <h1 class="text-pink">🌸 My "Want to Read" List</h1>
        <p class="text-muted small">Viewing session for: <span id="user-tag" class="text-pink fw-bold"></span></p>
        <hr>
        <div id="list-container" class="list-group list-group-flush"></div>
        <div class="mt-4">
            <a href="../index.html" class="btn btn-pink-outline rounded-pill px-4">Back Home</a>
            <button onclick="localStorage.removeItem('wantToRead'); location.reload();" class="btn btn-outline-danger rounded-pill px-4">Clear List</button>
        </div>
    </div>
    <script>
        document.getElementById('user-tag').innerText = sessionStorage.getItem('activeUser') || "Guest";
        const container = document.getElementById('list-container');
        const books = JSON.parse(localStorage.getItem('wantToRead')) || [];
        if(books.length === 0) {
            container.innerHTML = "<p class='italic-style text-muted'>Your list is empty!</p>";
        } else {
            books.forEach(b => container.innerHTML += `<div class='list-group-item py-3'>💖 ${b}</div>`);
        }
    </script>
</body>
</html>
