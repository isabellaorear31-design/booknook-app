<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNook | Session</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 text-center">
    <h1>Current Session State</h1>
    <div id="session-log" class="alert alert-info my-4">No data</div>
    <button id="clear-btn" class="btn btn-danger">Clear Session Data</button>
    <a href="../index.html" class="btn btn-link">Home</a>

    <script>
        const log = document.getElementById('session-log');
        const user = sessionStorage.getItem("activeUser");
        log.innerText = user ? `User "${user}" is currently active.` : "Logged out.";

        document.getElementById('clear-btn').onclick = () => {
            sessionStorage.clear();
            console.log("Session cleared by user.");
            location.reload();
        };
    </script>
</body>
</html>
