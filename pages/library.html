<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNook | Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="border-bottom pb-2">Your Romance Library</h1>
        <table class="table table-hover mt-4">
            <thead class="table-danger">
                <tr><th>Title</th><th>Author</th><th>Series</th></tr>
            </thead>
            <tbody id="library-table-body">
                </tbody>
        </table>
        <a href="../index.html" class="btn btn-secondary">Back to Home</a>
    </div>
    <script type="module">
        import { romanceBooks } from '../assets/data.js';
        const body = document.getElementById('library-table-body');
        romanceBooks.forEach(b => {
            body.innerHTML += `<tr><td>${b.title}</td><td>${b.author}</td><td>${b.series}</td></tr>`;
        });
    </script>
</body>
</html>
