<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNook | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-romance shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">💖 BookNook</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="pages/session.html">Session Data</a>
                <button class="btn btn-sm btn-outline-light ms-2" onclick="sessionStorage.clear(); location.reload();">Logout</button>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 text-pink">Find your next obsession.</h1>
            <p class="lead text-muted">Tracking the best in romance, from Forks to Mayfair.</p>
        </div>
    </header>

    <main class="container my-5">
        <input type="text" id="search-bar" class="form-control mb-5 shadow-sm" placeholder="Search romance titles...">
        <div id="book-display" class="row g-4"></div>
    </main>

    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body text-center p-4">
                    <img id="modalImage" src="" class="img-fluid rounded mb-3" style="max-height: 300px;">
                    <h2 id="modalBookTitle" class="text-pink"></h2>
                    <p id="modalAuthor" class="text-muted"></p>
                    <div id="modalStars" class="mb-3"></div>
                    <p id="modalDescription"></p>
                    <button type="button" class="btn btn-danger rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/app.js"></script>
</body>
</html>
