<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>BookNook</title>

<link rel="stylesheet" href="assets/style.css">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<header>
<h1>BookNook 💕</h1>
<p>Your cozy place to discover romance books</p>
</header>

<div class="search-container">

<input
type="text"
id="searchInput"
placeholder="Search romance books..."
>

<button onclick="searchBooks()">Search</button>

</div>

<div id="bookResults"></div>

<script src="assets/data.js"></script>

<script>

function displayBooks(bookArray){

const results = document.getElementById("bookResults");

results.innerHTML = "";

bookArray.forEach(function(book){

const card = document.createElement("div");

card.className = "book-card";

card.innerHTML =
"<h3>" + book.title + "</h3>" +
"<p><b>Author:</b> " + book.author + "</p>" +
"<p><b>Genre:</b> " + book.genre + "</p>";

results.appendChild(card);

});

}

function searchBooks(){

const searchValue =
document.getElementById("searchInput")
.value
.toLowerCase();

const filteredBooks = books.filter(function(book){

return book.title.toLowerCase().includes(searchValue) ||
book.author.toLowerCase().includes(searchValue);

});

displayBooks(filteredBooks);

}

displayBooks(books);

</script>

</body>

</html>
