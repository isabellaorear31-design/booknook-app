<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNook | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-romance shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">💖 BookNook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Menu</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="pages/library.html">My Library</a></li>
                            <li><a class="dropdown-item" href="pages/session.html">Session Data</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item text-danger" onclick="sessionStorage.clear(); location.reload();">Logout</button></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center py-5 border-bottom">
        <div class="container">
            <h1 class="display-4 text-pink">Find your next obsession.</h1>
            <p class="lead text-muted">Tracking the best in romance, from Forks to Mayfair.</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="row mb-5">
            <div class="col-md-8 mx-auto">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0">🔍</span>
                    <input type="text" id="search-bar" class="form-control form-control-lg border-start-0" placeholder="Search romance titles or authors...">
                </div>
            </div>
        </div>

        <div id="book-display" class="row g-4"></div>
    </main>

    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body text-center p-4">
                    <img id="modalImage" src="" class="img-fluid rounded mb-3 shadow-sm" style="max-height: 300px;">
                    <h2 id="modalBookTitle" class="text-pink"></h2>
                    <p id="modalAuthor" class="text-muted fw-bold"></p>
                    <div id="modalStars" class="text-warning fs-3 mb-3"></div>
                    <p id="modalDescription" class="text-secondary px-2"></p>
                    <div class="mt-4 d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-danger px-4 rounded-pill">Want to Read</button>
                        <button type="button" class="btn btn-outline-secondary px-4 rounded-pill" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/app.js"></script>
</body>
</html>
