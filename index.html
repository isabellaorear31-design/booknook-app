<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNook | Romance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-romance shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">💖 BookNook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="pages/library.html">My Library</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/session.html">Session Data</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center py-5 border-bottom">
        <div class="container">
            <h1 class="display-4 text-pink">Fall in love with your next read.</h1>
            <p class="lead text-muted">A curated collection for the ultimate romance fan.</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="row mb-5">
            <div class="col-md-8 mx-auto">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">🔍</span>
                    <input type="text" id="search-bar" class="form-control form-control-lg border-start-0 shadow-sm" placeholder="Search Twilight, Bridgerton, or authors...">
                </div>
                <p class="text-center mt-2 small text-muted">Click a book cover to see ratings and reviews!</p>
            </div>
        </div>

        <div id="book-display" class="row g-4">
            </div>
    </main>

    <div class="modal fade" id="bookModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header bg-cute-pink text-white" style="border-top-left-radius: 20px; border-top-right-radius: 20px;">
                    <h5 class="modal-title" id="modalTitle">Book Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <img id="modalImage" src="" class="img-fluid rounded shadow-sm mb-3" style="max-height: 350px; border: 5px solid #fff;">
                    <h2 id="modalBookTitle" class="text-pink mb-1"></h2>
                    <p id="modalAuthor" class="text-muted fw-bold mb-2"></p>
                    <div id="modalStars" class="text-warning fs-3 mb-3"></div>
                    <hr class="mx-auto w-25">
                    <p id="modalDescription" class="text-secondary px-2 italic-style"></p>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-pink-outline px-4" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger px-4">Want to Read</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/app.js"></script>
</body>
</html>
